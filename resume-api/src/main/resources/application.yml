spring:
  application:
    name: resume-api
  # profiles:
  #   default: dev

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    hikari:
      max-lifetime: ${SPRING_DATASOURCE_HIKARI_MAX_LIFETIME:1500000}
      idle-timeout: ${SPRING_DATASOURCE_HIKARI_IDLE_TIMEOUT:600000}
      keepalive-time: ${SPRING_DATASOURCE_HIKARI_KEEPALIVE_TIME:300000}
      validation-timeout: ${SPRING_DATASOURCE_HIKARI_VALIDATION_TIMEOUT:5000}

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: com.pedro.resumeapi.ai.kafka.AiJobRequestedMessageSerializer

  jpa:
    hibernate:
      ddl-auto: validate

  flyway:
    enabled: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  data:
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI}
      uuid-representation: standard

app:
  auth:
    google:
      client-id: ${GOOGLE_OAUTH_CLIENT_ID:}
      client-ids: ${GOOGLE_OAUTH_CLIENT_IDS:}
      token-info-url: ${GOOGLE_OAUTH_TOKEN_INFO_URL:https://oauth2.googleapis.com/tokeninfo}
  ai-jobs:
    kafka-enabled: ${APP_AI_JOBS_KAFKA_ENABLED:false}
    topic: ${KAFKA_PREFIX:}resume-ai-jobs
  storage:
    backend: S3
    s3:
      region: ${AWS_REGION}
      bucket: ${AWS_BUCKET}
      cloudfront-url: ${CLOUDFRONT_URL}
      presign-expiration: ${APP_STORAGE_S3_PRESIGN_EXPIRATION}
  jwt:
    secret: ${APP_JWT_SECRET}
    issuer: ${APP_JWT_ISSUER}
    expMinutes: ${APP_JWT_EXPMINUTES}
  # secret: mySecretKeyMySecretKeyMySecretKeyMySecretKeyMySecretKey

  security:
    rate-limit:
      share:
        enabled: false
        requests: 120
        window: 1m
  demo:
    seed:
      enabled: ${APP_DEMO_SEED_ENABLED:false}
      email: ${APP_DEMO_SEED_EMAIL:demo@hmpedro.com}
      password: ${APP_DEMO_SEED_PASSWORD:demo-password-change-me}
      resume-title: ${APP_DEMO_SEED_RESUME_TITLE:Demo Resume - Product Manager}
      s3-bucket: ${APP_DEMO_SEED_S3_BUCKET:resume-feedback-platform}
      version-one-s3-object-key: ${APP_DEMO_SEED_V1_S3_OBJECT_KEY:seed/pdf1_v1.pdf}
      version-two-s3-object-key: ${APP_DEMO_SEED_V2_S3_OBJECT_KEY:seed/pdf1_v1.pdf}
      version-one-s3-version-id: ${APP_DEMO_SEED_V1_S3_VERSION_ID:}
      version-two-s3-version-id: ${APP_DEMO_SEED_V2_S3_VERSION_ID:}
      version-one-local-path: ${APP_DEMO_SEED_V1_LOCAL_PATH:docs/seed/pdf1_v1.pdf}
      version-two-local-path: ${APP_DEMO_SEED_V2_LOCAL_PATH:docs/seed/pdf1_v2.pdf}

logging:
  level:
    root: WARN
    # org.springframework.security: DEBUG
