spring:
  datasource:
    url: jdbc:h2:mem:resume_api_test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true
  main:
    banner-mode: "off"
  data:
    mongodb:
      uri: mongodb://localhost:27017/resume_api_test
    redis:
      host: localhost
      port: 6379
      password:
      ssl:
        enabled: false
  kafka:
    bootstrap-servers: localhost:9092

app:
  storage:
    backend: LOCAL
    local-dir: ./target/test-resume-storage
    s3:
      presign-expiration: 10m
  jwt:
    secret: test-secret-key-test-secret-key-test-secret-key-123456
    issuer: resume-api-test
    expMinutes: 60
  security:
    rate-limit:
      share:
        enabled: false
