spring:
  application:
    name: resume-worker
  profiles:
    default: prod

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    hikari:
      connection-timeout: ${SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT:30000}
      maximum-pool-size: ${SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE:5}
      minimum-idle: ${SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE:0}
      max-lifetime: ${SPRING_DATASOURCE_HIKARI_MAX_LIFETIME:30000}
      idle-timeout: ${SPRING_DATASOURCE_HIKARI_IDLE_TIMEOUT:10000}
      keepalive-time: ${SPRING_DATASOURCE_HIKARI_KEEPALIVE_TIME:0}
      validation-timeout: ${SPRING_DATASOURCE_HIKARI_VALIDATION_TIMEOUT:5000}

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  data:
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI}
      uuid-representation: standard
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ${KAFKA_PREFIX:}resume-worker
      auto-offset-reset: earliest
    properties:
      security.protocol: ${SPRING_KAFKA_PROPERTIES_SECURITY_PROTOCOL:SSL}
      ssl.keystore.type: ${SPRING_KAFKA_PROPERTIES_SSL_KEYSTORE_TYPE:PEM}
      ssl.truststore.type: ${SPRING_KAFKA_PROPERTIES_SSL_TRUSTSTORE_TYPE:PEM}
      ssl.keystore.key: ${SPRING_KAFKA_PROPERTIES_SSL_KEYSTORE_KEY:${KAFKA_CLIENT_CERT_KEY:}}
      ssl.keystore.certificate.chain: ${SPRING_KAFKA_PROPERTIES_SSL_KEYSTORE_CERTIFICATE_CHAIN:${KAFKA_CLIENT_CERT:}}
      ssl.truststore.certificates: ${SPRING_KAFKA_PROPERTIES_SSL_TRUSTSTORE_CERTIFICATES:${KAFKA_TRUSTED_CERT:}}
app:
  ai:
    provider: ${APP_AI_PROVIDER:gemini}
  storage:
    backend: ${APP_STORAGE_BACKEND:S3}
    s3:
      region: ${AWS_REGION:us-east-1}
  ai-jobs:
    kafka-enabled: ${APP_AI_JOBS_KAFKA_ENABLED:false}
    topic: ${KAFKA_PREFIX:}resume-ai-jobs
    retry:
      max-attempts: ${APP_AI_JOBS_RETRY_MAX_ATTEMPTS:3}
      initial-backoff: ${APP_AI_JOBS_RETRY_INITIAL_BACKOFF:PT30S}
      max-backoff: ${APP_AI_JOBS_RETRY_MAX_BACKOFF:PT10M}
      poll-interval: ${APP_AI_JOBS_POLL_INTERVAL:PT5S}
  ai-feedback:
    model: ${APP_AI_MODEL:gemini-1.5-flash}
    prompt-version: v3
    progress-enabled: ${APP_AI_FEEDBACK_PROGRESS_ENABLED:true}
    max-resume-chars: ${APP_AI_FEEDBACK_MAX_RESUME_CHARS:8000}
    gemini:
      enabled: true
      api-key: ${GEMINI_API_KEY:}
      base-url: https://generativelanguage.googleapis.com
      model: ${APP_AI_FEEDBACK_GEMINI_MODEL:${APP_AI_MODEL:gemini-1.5-flash}}
      temperature: ${APP_AI_FEEDBACK_GEMINI_TEMPERATURE:${APP_AI_TEMPERATURE:0.2}}
      max-output-tokens: ${APP_AI_FEEDBACK_GEMINI_MAX_OUTPUT_TOKENS:${APP_AI_MAX_OUTPUT_TOKENS:1800}}
    openai:
      enabled: ${APP_AI_FEEDBACK_OPENAI_ENABLED:true}
      api-key: ${OPENAI_API_KEY:}
      base-url: ${APP_AI_FEEDBACK_OPENAI_BASE_URL:https://api.openai.com}
      model: ${APP_AI_FEEDBACK_OPENAI_MODEL:${APP_AI_MODEL:gpt-4o-mini}}
      temperature: ${APP_AI_FEEDBACK_OPENAI_TEMPERATURE:${APP_AI_TEMPERATURE:0.2}}
      max-output-tokens: ${APP_AI_FEEDBACK_OPENAI_MAX_OUTPUT_TOKENS:${APP_AI_MAX_OUTPUT_TOKENS:1800}}
    azure-openai:
      enabled: ${APP_AI_FEEDBACK_AZURE_OPENAI_ENABLED:false}
      api-key: ${AZURE_OPENAI_API_KEY:}
      endpoint: ${AZURE_OPENAI_ENDPOINT:}
      deployment: ${AZURE_OPENAI_DEPLOYMENT:${APP_AI_MODEL:}}
      api-version: ${AZURE_OPENAI_API_VERSION:2024-08-01-preview}
      temperature: ${APP_AI_FEEDBACK_AZURE_OPENAI_TEMPERATURE:${APP_AI_TEMPERATURE:0.2}}
      max-output-tokens: ${APP_AI_FEEDBACK_AZURE_OPENAI_MAX_OUTPUT_TOKENS:${APP_AI_MAX_OUTPUT_TOKENS:1800}}
    foundry-iq:
      enabled: ${APP_AI_FEEDBACK_FOUNDRY_IQ_ENABLED:false}
      source: ${APP_AI_FEEDBACK_FOUNDRY_IQ_SOURCE:local}
      max-context-chars: ${APP_AI_FEEDBACK_FOUNDRY_IQ_MAX_CONTEXT_CHARS:1800}
      azure-search:
        endpoint: ${AZURE_SEARCH_ENDPOINT:}
        index-name: ${AZURE_SEARCH_INDEX_NAME:}
        api-key: ${AZURE_SEARCH_API_KEY:}
        api-version: ${AZURE_SEARCH_API_VERSION:2024-07-01}
        query-type: ${AZURE_SEARCH_QUERY_TYPE:semantic}
        semantic-configuration: ${AZURE_SEARCH_SEMANTIC_CONFIGURATION:}
        content-field: ${AZURE_SEARCH_CONTENT_FIELD:content}
        title-field: ${AZURE_SEARCH_TITLE_FIELD:title}
        url-field: ${AZURE_SEARCH_URL_FIELD:url}
        top: ${AZURE_SEARCH_TOP:3}

logging:
  level:
    root: INFO
